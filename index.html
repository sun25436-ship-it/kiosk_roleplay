<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H상점 키오스크</title>
<style>
  :root{
    --paper:#faf6ec;
    --paper-dark:#efe7d4;
    --ink:#2b2620;
    --ink-soft:#6b6253;
    --tag-red:#c1492f;
    --tag-green:#5c7a52;
    --line:#d8cdb4;
    --highlight:#f4c542;
  }

  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}

  html, body{
    height:100%;
  }

  body{
    background:var(--paper-dark);
    color:var(--ink);
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    min-height:100%;
    display:flex;
    justify-content:center;
    padding:24px 12px;
    -webkit-text-size-adjust:100%;
    touch-action: manipulation;
  }

  .kiosk{
    width:100%;
    max-width:480px;
    background:var(--paper);
    border:1px solid var(--line);
    box-shadow: 0 1px 0 var(--line), 0 20px 40px -20px rgba(0,0,0,0.25);
    display:flex;
    flex-direction:column;
    min-height:600px;
    position:relative;
  }

  /* 영수증 톱니 가장자리 */
  .kiosk::before, .kiosk::after{
    content:"";
    position:absolute;
    left:0; right:0;
    height:10px;
    background-image: radial-gradient(circle at 10px 0, transparent 9px, var(--paper-dark) 9.5px);
    background-size: 20px 10px;
    background-repeat: repeat-x;
  }
  .kiosk::before{ top:-9px; transform: rotate(180deg); }
  .kiosk::after{ bottom:-9px; }

  header{
    padding:28px 24px 18px;
    text-align:center;
    border-bottom: 2px dashed var(--line);
  }

  .store-eyebrow{
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:11px;
    letter-spacing:0.25em;
    color:var(--ink-soft);
    text-transform:uppercase;
  }

  .store-name{
    font-size:38px;
    font-weight:700;
    margin-top:6px;
    letter-spacing:0.02em;
  }
  .store-name span{
    display:inline-block;
    background:var(--highlight);
    padding:2px 10px;
    transform: rotate(-1.5deg);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  }

  .store-sub{
    margin-top:10px;
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:11px;
    color:var(--ink-soft);
  }

  /* 카테고리 탭 */
  .tabs{
    display:flex;
    gap:6px;
    padding:14px 16px 0;
    overflow-x:auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab{
    flex:0 0 auto;
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:12px;
    padding:7px 12px;
    border:1px solid var(--line);
    border-radius:999px;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    white-space:nowrap;
  }
  .tab.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  /* 상품 그리드 */
  .catalog{
    flex:1;
    padding:18px 16px 12px;
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
    align-content:start;
  }

  .item{
    border:1px solid var(--line);
    background:#fff;
    padding:12px 12px 14px;
    cursor:pointer;
    position:relative;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    text-align:left;
  }
  .item:hover{
    transform: translateY(-2px);
    box-shadow: 3px 4px 0 var(--line);
  }
  .item:active{ transform: translateY(0); box-shadow:none; }

  .item-emoji{
    font-size:26px;
    display:block;
    margin-bottom:6px;
  }
  .item-name{
    font-size:14px;
    font-weight:700;
    line-height:1.3;
    min-height:36px;
  }
  .item-price{
    margin-top:6px;
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:13px;
    color:var(--tag-red);
    font-weight:700;
  }

  .item-add{
    position:absolute;
    top:10px; right:10px;
    width:22px; height:22px;
    border-radius:50%;
    background:var(--ink);
    color:var(--paper);
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:14px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .qty-badge{
    position:absolute;
    top:-8px; left:-8px;
    background:var(--tag-red);
    color:#fff;
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:11px;
    font-weight:700;
    border-radius:50%;
    width:20px; height:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: 0 0 0 2px var(--paper);
    display:none;
  }
  .item.in-cart .qty-badge{ display:flex; }

  /* 장바구니 영역 */
  .cart-section{
    border-top: 2px dashed var(--line);
    padding:16px 18px;
    background: var(--paper);
  }

  .cart-title{
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:12px;
    letter-spacing:0.15em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }

  .clear-btn{
    background:none;
    border:none;
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-decoration:underline;
    cursor:pointer;
  }

  .cart-empty{
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:12px;
    color:var(--ink-soft);
    padding:10px 0;
    text-align:center;
  }

  .cart-list{
    max-height:180px;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .cart-row{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
  }
  .cart-row-name{
    flex:1;
    line-height:1.3;
  }
  .cart-row-controls{
    display:flex;
    align-items:center;
    gap:6px;
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:13px;
  }
  .stepper-btn{
    width:22px; height:22px;
    border:1px solid var(--line);
    background:#fff;
    cursor:pointer;
    font-size:13px;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cart-row-price{
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:13px;
    min-width:62px;
    text-align:right;
    color:var(--ink);
  }

  .totals{
    margin-top:14px;
    padding-top:12px;
    border-top:1px solid var(--line);
  }
  .total-row{
    display:flex;
    justify-content:space-between;
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .total-row.grand{
    font-size:20px;
    font-weight:700;
    color:var(--ink);
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    letter-spacing:0.02em;
    margin-top:8px;
  }
  .total-row.grand .amount{
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
  }

  .pay-section{
    padding:6px 18px 24px;
  }
  .pay-label{
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:12px;
    letter-spacing:0.15em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .pay-options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:14px;
  }
  .pay-btn{
    border:1px solid var(--line);
    background:#fff;
    padding:14px 10px;
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }
  .pay-btn .icon{ font-size:20px; }
  .pay-btn.selected{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  .checkout-btn{
    width:100%;
    padding:16px;
    background:var(--tag-red);
    color:#fff;
    border:none;
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:0.02em;
  }
  .checkout-btn:disabled{
    background:#c9c2b0;
    cursor:not-allowed;
  }
  .checkout-btn:not(:disabled):active{
    transform: translateY(1px);
  }

  /* 결제 완료 모달 */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(43,38,32,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.show{ display:flex; }

  .receipt-modal{
    background:var(--paper);
    width:100%;
    max-width:340px;
    padding:28px 26px 26px;
    position:relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .receipt-modal::before, .receipt-modal::after{
    content:"";
    position:absolute;
    left:0; right:0;
    height:10px;
    background-image: radial-gradient(circle at 10px 0, transparent 9px, rgba(43,38,32,0.55) 9.5px);
    background-size: 20px 10px;
    background-repeat: repeat-x;
  }
  .receipt-modal::before{ top:-9px; transform: rotate(180deg); }
  .receipt-modal::after{ bottom:-9px; }

  .receipt-stamp{
    width:64px; height:64px;
    border:3px solid var(--tag-green);
    border-radius:50%;
    color:var(--tag-green);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-weight:700;
    font-size:12px;
    margin:0 auto 16px;
    transform: rotate(-8deg);
  }

  .receipt-title{
    text-align:center;
    font-size:20px;
    font-weight:700;
    margin-bottom:4px;
  }
  .receipt-sub{
    text-align:center;
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-bottom:18px;
  }

  .receipt-lines{
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size:12px;
    display:flex;
    flex-direction:column;
    gap:5px;
    border-top:1px dashed var(--line);
    border-bottom:1px dashed var(--line);
    padding:14px 0;
    margin-bottom:14px;
  }
  .receipt-line{
    display:flex;
    justify-content:space-between;
  }
  .receipt-line.sum{
    font-weight:700;
    font-size:14px;
    margin-top:6px;
  }

  .close-modal{
    width:100%;
    padding:13px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }

  @media (max-width:360px){
    .store-name{ font-size:32px; }
    .catalog{ grid-template-columns:1fr 1fr; gap:10px; }
  }
</style>
</head>
<body>

<div class="kiosk">
  <header>
    <div class="store-eyebrow">SELF ORDER · NO.07</div>
    <div class="store-name"><span>H상점</span></div>
    <div class="store-sub">캐릭터 굿즈 · 잡화 · 뽑기</div>
  </header>

  <div class="tabs" id="tabs"></div>

  <div class="catalog" id="catalog"></div>

  <div class="cart-section">
    <div class="cart-title">
      <span>담은 상품</span>
      <button type="button" class="clear-btn" id="clearBtn">전체 비우기</button>
    </div>
    <div id="cartArea"></div>

    <div class="totals">
      <div class="total-row"><span>상품 수</span><span id="itemCount">0개</span></div>
      <div class="total-row grand"><span>총 결제금액</span><span class="amount" id="grandTotal">0원</span></div>
    </div>
  </div>

  <div class="pay-section">
    <div class="pay-label">결제 수단</div>
    <div class="pay-options">
      <button type="button" class="pay-btn" data-method="card"><span class="icon">💳</span>카드</button>
      <button type="button" class="pay-btn" data-method="cash"><span class="icon">💵</span>현금</button>
    </div>
    <button type="button" class="checkout-btn" id="checkoutBtn" disabled>결제하기</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="receipt-modal">
    <div class="receipt-stamp">PAID</div>
    <div class="receipt-title">결제가 완료되었습니다</div>
    <div class="receipt-sub" id="payMethodText">CARD PAYMENT</div>
    <div class="receipt-lines" id="receiptLines"></div>
    <button type="button" class="close-modal" id="closeModal">새 주문 받기</button>
  </div>
</div>

<script>
  const products = [
    { id:1, name:"모자", price:1000, emoji:"🧢", cat:"잡화" },
    { id:2, name:"시나모롤 뽑기 기계", price:4000, emoji:"🎰", cat:"뽑기" },
    { id:3, name:"시나모롤 장난감", price:3000, emoji:"🐶", cat:"장난감" },
    { id:4, name:"피규어", price:20000, emoji:"🗿", cat:"피규어" },
    { id:5, name:"계산기 키캡", price:2000, emoji:"🔢", cat:"키캡" },
    { id:6, name:"키캡", price:1500, emoji:"⌨️", cat:"키캡" },
    { id:7, name:"선글라스", price:2000, emoji:"🕶️", cat:"잡화" },
    { id:8, name:"셀카봉", price:3000, emoji:"🤳", cat:"잡화" },
    { id:9, name:"우산", price:3000, emoji:"☂️", cat:"잡화" },
    { id:10, name:"주토피아 장난감", price:1000, emoji:"🦊", cat:"장난감" },
    { id:11, name:"작은 피규어", price:2000, emoji:"🧸", cat:"피규어" },
  ];

  const categories = ["전체", ...Array.from(new Set(products.map(p => p.cat)))];
  let activeCat = "전체";
  let selectedMethod = null;
  const cart = {}; // id -> qty

  const tabsEl = document.getElementById("tabs");
  const catalogEl = document.getElementById("catalog");
  const cartAreaEl = document.getElementById("cartArea");
  const itemCountEl = document.getElementById("itemCount");
  const grandTotalEl = document.getElementById("grandTotal");
  const checkoutBtn = document.getElementById("checkoutBtn");
  const overlay = document.getElementById("overlay");
  const receiptLines = document.getElementById("receiptLines");
  const payMethodText = document.getElementById("payMethodText");

  function won(n){ return n.toLocaleString("ko-KR") + "원"; }

  function renderTabs(){
    tabsEl.innerHTML = categories.map(c =>
      `<button type="button" class="tab ${c===activeCat ? "active":""}" data-cat="${c}">${c}</button>`
    ).join("");
  }

  function renderCatalog(){
    const list = activeCat === "전체" ? products : products.filter(p => p.cat === activeCat);
    catalogEl.innerHTML = list.map(p => `
      <div class="item ${cart[p.id] ? "in-cart" : ""}" data-id="${p.id}">
        <div class="qty-badge">${cart[p.id] || ""}</div>
        <div class="item-add">+</div>
        <span class="item-emoji">${p.emoji}</span>
        <div class="item-name">${p.name}</div>
        <div class="item-price">${won(p.price)}</div>
      </div>
    `).join("");
  }

  function renderCart(){
    const ids = Object.keys(cart).filter(id => cart[id] > 0);
    if(ids.length === 0){
      cartAreaEl.innerHTML = `<div class="cart-empty">아직 담은 상품이 없습니다</div>`;
      return;
    }
    cartAreaEl.innerHTML = `<div class="cart-list">` + ids.map(id => {
      const p = products.find(p => p.id === Number(id));
      const qty = cart[id];
      return `
        <div class="cart-row" data-id="${id}">
          <span class="cart-row-name">${p.emoji} ${p.name}</span>
          <div class="cart-row-controls">
            <button type="button" class="stepper-btn" data-action="dec" data-id="${id}">−</button>
            <span>${qty}</span>
            <button type="button" class="stepper-btn" data-action="inc" data-id="${id}">+</button>
          </div>
          <span class="cart-row-price">${won(p.price * qty)}</span>
        </div>
      `;
    }).join("") + `</div>`;
  }

  function getTotals(){
    let count = 0, total = 0;
    Object.keys(cart).forEach(id => {
      const p = products.find(p => p.id === Number(id));
      count += cart[id];
      total += p.price * cart[id];
    });
    return { count, total };
  }

  function renderTotals(){
    const { count, total } = getTotals();
    itemCountEl.textContent = count + "개";
    grandTotalEl.textContent = won(total);
    updateCheckoutState();
  }

  function updateCheckoutState(){
    const { count } = getTotals();
    checkoutBtn.disabled = !(count > 0 && selectedMethod);
  }

  function renderAll(){
    renderCatalog();
    renderCart();
    renderTotals();
  }

  document.addEventListener("click", function(e){
    const tab = e.target.closest(".tab");
    if(tab){
      activeCat = tab.dataset.cat;
      renderTabs();
      renderCatalog();
      return;
    }

    const item = e.target.closest(".item");
    if(item && catalogEl.contains(item)){
      const id = Number(item.dataset.id);
      cart[id] = (cart[id] || 0) + 1;
      renderAll();
      return;
    }

    const stepBtn = e.target.closest(".stepper-btn");
    if(stepBtn){
      const id = stepBtn.dataset.id;
      if(stepBtn.dataset.action === "inc"){
        cart[id] = (cart[id] || 0) + 1;
      } else {
        cart[id] = (cart[id] || 0) - 1;
        if(cart[id] <= 0) delete cart[id];
      }
      renderAll();
      return;
    }

    const payBtn = e.target.closest(".pay-btn");
    if(payBtn){
      selectedMethod = payBtn.dataset.method;
      document.querySelectorAll(".pay-btn").forEach(b => b.classList.remove("selected"));
      payBtn.classList.add("selected");
      updateCheckoutState();
      return;
    }

    if(e.target.closest("#clearBtn")){
      Object.keys(cart).forEach(k => delete cart[k]);
      renderAll();
      return;
    }

    if(e.target.closest("#checkoutBtn") && !checkoutBtn.disabled){
      const { total } = getTotals();
      const ids = Object.keys(cart).filter(id => cart[id] > 0);
      receiptLines.innerHTML = ids.map(id => {
        const p = products.find(p => p.id === Number(id));
        const qty = cart[id];
        return `<div class="receipt-line"><span>${p.name} × ${qty}</span><span>${won(p.price*qty)}</span></div>`;
      }).join("") + `<div class="receipt-line sum"><span>합계</span><span>${won(total)}</span></div>`;

      payMethodText.textContent = selectedMethod === "card" ? "CARD PAYMENT" : "CASH PAYMENT";
      overlay.classList.add("show");
      return;
    }

    if(e.target.closest("#closeModal")){
      overlay.classList.remove("show");
      Object.keys(cart).forEach(k => delete cart[k]);
      selectedMethod = null;
      document.querySelectorAll(".pay-btn").forEach(b => b.classList.remove("selected"));
      renderAll();
      return;
    }
  }, false);

  renderTabs();
  renderAll();
</script>

</body>
</html>
